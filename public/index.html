<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RWR Data Agent</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--text:#e4e4e7;--muted:#71717a;--accent:#3b82f6;--accent-hover:#2563eb;--user-bg:#1e3a5f;--ai-bg:#1a1d27;--radius:12px}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
    header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface)}
    header h1{font-size:18px;font-weight:600}
    header span{font-size:12px;color:var(--muted);background:var(--border);padding:2px 8px;border-radius:99px}
    #chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
    .msg{max-width:80%;padding:12px 16px;border-radius:var(--radius);line-height:1.6;font-size:14px;white-space:pre-wrap;word-break:break-word}
    .msg.user{align-self:flex-end;background:var(--user-bg);color:#dbeafe}
    .msg.ai{align-self:flex-start;background:var(--ai-bg);border:1px solid var(--border)}
    .msg.error{background:#3b1219;border:1px solid #7f1d1d;color:#fca5a5}
    .msg-meta{align-self:flex-start;font-size:11px;color:var(--muted);margin-top:-10px;padding:0 16px 0 4px;user-select:none}
    .typing{align-self:flex-start;color:var(--muted);font-size:13px;padding:8px 16px}
    .typing span{animation:blink 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
    #input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:12px}
    #input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;color:var(--text);font-size:14px;outline:none;resize:none;font-family:inherit}
    #input:focus{border-color:var(--accent)}
    #input::placeholder{color:var(--muted)}
    #send{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:0 20px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s}
    #send:hover{background:var(--accent-hover)}
    #send:disabled{opacity:.5;cursor:not-allowed}
    .welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;color:var(--muted)}
    .welcome h2{font-size:20px;color:var(--text);font-weight:600}
    .welcome p{font-size:14px;max-width:420px;line-height:1.6}
    .examples{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
    .examples button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;transition:border-color .15s}
    .examples button:hover{border-color:var(--accent)}
  </style>
</head>
<body>
  <header>
    <h1>RWR Data Agent</h1>
    <span>v1</span>
  </header>
  <div id="chat">
    <div class="welcome" id="welcome">
      <h2>Running With Rifles 数据查询</h2>
      <p>基于 RAG 的游戏数据 AI 助手，支持武器、兵种、载具、阵营等数据查询</p>
      <div class="examples">
        <button onclick="ask('有哪些武器？')">有哪些武器？</button>
        <button onclick="ask('M4A1 的属性')">M4A1 属性</button>
        <button onclick="ask('key: m4a1')">精确查询 M4A1</button>
      </div>
    </div>
  </div>
  <div id="input-area">
    <textarea id="input" rows="1" placeholder="输入查询，例如：有哪些武器？ 或 key: weapon_name" onkeydown="handleKey(event)"></textarea>
    <button id="send" onclick="sendMessage()">发送</button>
  </div>
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    let welcome = document.getElementById('welcome');
    const history = [];
    let loading = false;

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function ask(q) { input.value = q; sendMessage(); }

    function removeWelcome() {
      if (welcome) { welcome.remove(); welcome = null; }
    }

    function addMsg(text, cls) {
      removeWelcome();
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function addTyping() {
      removeWelcome();
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing-indicator';
      div.innerHTML = '思考中<span>.</span><span>.</span><span>.</span>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function typingToAiDiv() {
      const el = document.getElementById('typing-indicator');
      if (el) {
        el.className = 'msg ai';
        el.id = '';
        el.innerHTML = '';
        return el;
      }
      const div = document.createElement('div');
      div.className = 'msg ai';
      chat.appendChild(div);
      return div;
    }

    function addMeta(text) {
      const div = document.createElement('div');
      div.className = 'msg-meta';
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || loading) return;
      loading = true;
      sendBtn.disabled = true;

      addMsg(text, 'user');
      history.push({ role: 'user', content: text });
      input.value = '';
      input.style.height = 'auto';

      addTyping();

      const t0 = performance.now();
      let firstChunkTime = 0;
      let usage = null;

      try {
        const res = await fetch('/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'rwr-agent',
            messages: history.slice(),
            stream: true,
          }),
        });

        if (!res.ok) {
          removeTyping();
          const err = await res.text();
          history.pop();
          addMsg('请求失败: ' + err, 'error');
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        let fullContent = '';
        let aiDiv = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop() || '';

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || !trimmed.startsWith('data: ')) continue;
            const data = trimmed.slice(6);
            if (data === '[DONE]') continue;
            try {
              const json = JSON.parse(data);
              const content = json.choices?.[0]?.delta?.content || '';
              if (content) {
                if (!aiDiv) {
                  removeTyping();
                  aiDiv = typingToAiDiv();
                  firstChunkTime = performance.now();
                }
                fullContent += content;
                aiDiv.textContent += content;
                chat.scrollTop = chat.scrollHeight;
              }
              if (json.usage) usage = json.usage;
            } catch {}
          }
        }

        if (!aiDiv) removeTyping();

        const totalTime = Math.round(performance.now() - t0);
        const ttfb = firstChunkTime > 0 ? Math.round(firstChunkTime - t0) : '-';
        const inTokens = usage?.prompt_tokens ?? '-';
        const outTokens = usage?.completion_tokens ?? '-';
        addMeta(`TTFB ${ttfb}ms · 总耗时 ${totalTime}ms · 输入 ${inTokens} tokens · 输出 ${outTokens} tokens`);
        console.log(`[frontend] TTFB=${ttfb}ms total=${totalTime}ms in=${inTokens} out=${outTokens}`);

        history.push({ role: 'assistant', content: fullContent });
      } catch (err) {
        removeTyping();
        history.pop();
        addMsg('网络错误: ' + err.message, 'error');
      } finally {
        loading = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    input.focus();
  </script>
</body>
</html>
