<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RWR Data Agent</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--text:#e4e4e7;--muted:#71717a;--accent:#3b82f6;--accent-hover:#2563eb;--user-bg:#1e3a5f;--ai-bg:#1a1d27;--radius:12px}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
    header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface)}
    header h1{font-size:18px;font-weight:600}
    header span{font-size:12px;color:var(--muted);background:var(--border);padding:2px 8px;border-radius:99px}
    #table-select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px;font-size:12px;outline:none;cursor:pointer;margin-left:auto}
    #table-select:focus{border-color:var(--accent)}
    #lang-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;transition:border-color .15s, color .15s}
    #lang-btn:hover{border-color:var(--accent);color:var(--text)}
    #chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
    .msg{max-width:80%;padding:12px 16px;border-radius:var(--radius);line-height:1.6;font-size:14px;white-space:pre-wrap;word-break:break-word}
    .msg.user{align-self:flex-end;background:var(--user-bg);color:#dbeafe}
    .msg.ai{align-self:flex-start;background:var(--ai-bg);border:1px solid var(--border)}
    .msg.error{background:#3b1219;border:1px solid #7f1d1d;color:#fca5a5}
    .msg-meta{align-self:flex-start;font-size:11px;color:var(--muted);margin-top:-10px;padding:0 16px 0 4px;user-select:none}
    .typing{align-self:flex-start;color:var(--muted);font-size:13px;padding:8px 16px}
    .typing span{animation:blink 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
    #input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;gap:8px}
    #input-row{display:flex;gap:12px;align-items:flex-end}
    #input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;color:var(--text);font-size:16px;outline:none;resize:none;font-family:inherit;overflow-y:hidden;line-height:1.5;min-height:44px}
    #input:focus{border-color:var(--accent)}
    #input::placeholder{color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #send{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:0 20px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;height:44px}
    #send:hover{background:var(--accent-hover)}
    #send:disabled{opacity:.5;cursor:not-allowed}
    #ctx-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);user-select:none}
    #ctx-track{flex:1;max-width:200px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
    #ctx-fill{height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width .3s,background .3s}
    #ctx-fill.warn{background:#f59e0b}
    #ctx-fill.over{background:#ef4444}
    .welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;color:var(--muted)}
    .welcome h2{font-size:20px;color:var(--text);font-weight:600}
    .welcome p{font-size:14px;max-width:420px;line-height:1.6}
    .examples{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
    .examples button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;transition:border-color .15s}
    .examples button:hover{border-color:var(--accent)}
    @media(max-width:640px){
      header{padding:10px 12px;gap:8px}
      header h1{font-size:15px}
      #table-select{font-size:11px;max-width:140px}
      #chat{padding:12px 8px;gap:12px}
      .msg{max-width:92%;font-size:13px;padding:10px 12px}
      #input-area{padding:10px 12px}
      #input{font-size:16px;padding:10px 12px}
      #send{padding:0 14px;height:40px;font-size:13px}
      .welcome h2{font-size:17px}
      .welcome p{font-size:13px}
    }
  </style>
</head>
<body>
  <header>
    <h1>RWR Data Agent</h1>
    <span>v1</span>
    <select id="table-select">
      <option value="">rwr_documents (默认)</option>
    </select>
    <button id="lang-btn" onclick="toggleLang()">EN</button>
  </header>
  <div id="chat">
    <div class="welcome" id="welcome">
      <h2>Running With Rifles 数据查询</h2>
      <p>基于 RAG 的游戏数据 AI 助手，支持武器、兵种、载具、阵营等数据查询</p>
      <div class="examples">
        <button onclick="ask(t().exWeapons)">有哪些武器？</button>
        <button onclick="ask(t().exM4a1)">M4A1 属性</button>
        <button onclick="ask(t().exExact)">精确查询 M4A1</button>
      </div>
    </div>
  </div>
  <div id="input-area">
    <div id="input-row">
      <textarea id="input" rows="1" placeholder="输入查询，如：有哪些武器？" onkeydown="handleKey(event)"></textarea>
      <button id="send" onclick="sendMessage()">发送</button>
    </div>
    <div id="ctx-bar">
      <div id="ctx-track"><div id="ctx-fill"></div></div>
      <span id="ctx-label">0 / 200K tokens</span>
    </div>
  </div>
  <script>
    const i18n = {
      zh: {
        htmlLang: 'zh-CN',
        welcomeTitle: 'Running With Rifles 数据查询',
        welcomeDesc: '基于 RAG 的游戏数据 AI 助手，支持武器、兵种、载具、阵营等数据查询',
        exWeapons: '有哪些武器？',
        exM4a1: 'M4A1 的属性',
        exExact: '精确查询 M4A1',
        placeholder: '输入查询，如：有哪些武器？',
        send: '发送',
        thinking: '思考中',
        defaultTag: '(默认)',
        ctxOver: '上下文已达上限，请刷新页面开始新对话',
        reqFailed: '请求失败: ',
        netError: '网络错误: ',
        metaFormat: (ttfb, total, inp, out) => `TTFB ${ttfb}ms · 总耗时 ${total}ms · 输入 ${inp} tokens · 输出 ${out} tokens`,
        langLabel: 'EN',
      },
      en: {
        htmlLang: 'en',
        welcomeTitle: 'Running With Rifles Data Query',
        welcomeDesc: 'RAG-based game data AI assistant — weapons, soldiers, vehicles, factions & more',
        exWeapons: 'What weapons?',
        exM4a1: 'M4A1 stats',
        exExact: 'Exact lookup M4A1',
        placeholder: 'Enter query, e.g.: What weapons?',
        send: 'Send',
        thinking: 'Thinking',
        defaultTag: '(Default)',
        ctxOver: 'Context limit reached, please refresh to start a new conversation',
        reqFailed: 'Request failed: ',
        netError: 'Network error: ',
        metaFormat: (ttfb, total, inp, out) => `TTFB ${ttfb}ms · Total ${total}ms · In ${inp} tokens · Out ${out} tokens`,
        langLabel: '中文',
      },
    };

    const browserLang = (navigator.language || 'zh').startsWith('zh') ? 'zh' : 'en';
    let lang = localStorage.getItem('lang') || browserLang;

    function t() { return i18n[lang]; }

    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const ctxFill = document.getElementById('ctx-fill');
    const ctxLabel = document.getElementById('ctx-label');
    const tableSelect = document.getElementById('table-select');
    let welcome = document.getElementById('welcome');
    const history = [];
    let loading = false;
    const MAX_CONTEXT = 200000;
    let contextUsed = 0;

    function applyLang() {
      document.documentElement.lang = t().htmlLang;
      input.placeholder = t().placeholder;
      sendBtn.textContent = t().send;
      document.getElementById('lang-btn').textContent = t().langLabel;
      if (welcome) {
        welcome.querySelector('h2').textContent = t().welcomeTitle;
        welcome.querySelector('p').textContent = t().welcomeDesc;
        const btns = welcome.querySelectorAll('.examples button');
        if (btns[0]) btns[0].textContent = t().exWeapons;
        if (btns[1]) btns[1].textContent = t().exM4a1;
        if (btns[2]) btns[2].textContent = t().exExact;
      }
    }

    function toggleLang() {
      lang = lang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('lang', lang);
      applyLang();
    }

    (async function loadTables() {
      try {
        const res = await fetch('/v1/tables');
        if (!res.ok) return;
        const data = await res.json();
        const def = data.default || 'rwr_documents';
        const tables = data.tables || [];
        tableSelect.innerHTML = '';
        tables.forEach(tbl => {
          const opt = document.createElement('option');
          opt.value = tbl === def ? '' : tbl;
          opt.textContent = tbl + (tbl === def ? ' ' + t().defaultTag : '');
          tableSelect.appendChild(opt);
        });
        if (!tables.length) {
          const opt = document.createElement('option');
          opt.value = '';
          opt.textContent = def + ' ' + t().defaultTag;
          tableSelect.appendChild(opt);
        }
      } catch {}
    })();

    tableSelect.addEventListener('change', () => {
      history.length = 0;
      contextUsed = 0;
      updateContextBar();
      chat.innerHTML = '';
      const w = document.createElement('div');
      w.className = 'welcome';
      w.id = 'welcome';
      w.innerHTML = '<h2></h2><p></p><div class="examples"><button onclick="ask(t().exWeapons)"></button><button onclick="ask(t().exM4a1)"></button><button onclick="ask(t().exExact)"></button></div>';
      chat.appendChild(w);
      welcome = w;
      applyLang();
    });

    function estimateTokens(text) {
      return Math.ceil(text.length / 1.5);
    }

    function estimateHistoryTokens() {
      return history.reduce((sum, m) => sum + estimateTokens(m.content), 0);
    }

    function updateContextBar() {
      const inputTokens = estimateTokens(input.value);
      const base = contextUsed > 0 ? contextUsed : estimateHistoryTokens();
      const used = base + inputTokens;
      const pct = Math.min((used / MAX_CONTEXT) * 100, 100);
      ctxFill.style.width = pct + '%';
      ctxFill.className = pct > 90 ? 'over' : pct > 70 ? 'warn' : '';
      const display = used >= 1000 ? (used / 1000).toFixed(1) + 'K' : used;
      ctxLabel.textContent = display + ' / 200K tokens';
      ctxLabel.style.color = pct > 90 ? '#f87171' : pct > 70 ? '#fbbf24' : 'var(--muted)';
    }

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      updateContextBar();
    });

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function ask(q) { input.value = q; sendMessage(); }

    function removeWelcome() {
      if (welcome) { welcome.remove(); welcome = null; }
    }

    function addMsg(text, cls) {
      removeWelcome();
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function addTyping() {
      removeWelcome();
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing-indicator';
      div.innerHTML = t().thinking + '<span>.</span><span>.</span><span>.</span>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function typingToAiDiv() {
      const el = document.getElementById('typing-indicator');
      if (el) {
        el.className = 'msg ai';
        el.id = '';
        el.innerHTML = '';
        return el;
      }
      const div = document.createElement('div');
      div.className = 'msg ai';
      chat.appendChild(div);
      return div;
    }

    function addMeta(text) {
      const div = document.createElement('div');
      div.className = 'msg-meta';
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || loading) return;
      const checkBase = contextUsed > 0 ? contextUsed : estimateHistoryTokens();
      if (checkBase + estimateTokens(text) >= MAX_CONTEXT) {
        addMsg(t().ctxOver, 'error');
        return;
      }
      loading = true;
      sendBtn.disabled = true;

      addMsg(text, 'user');
      history.push({ role: 'user', content: text });
      input.value = '';
      input.style.height = 'auto';

      addTyping();

      const t0 = performance.now();
      let firstChunkTime = 0;
      let usage = null;

      try {
        const res = await fetch('/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'rwr-agent',
            messages: history.slice(),
            stream: true,
            ...(tableSelect.value ? { table: tableSelect.value } : {}),
          }),
        });

        if (!res.ok) {
          removeTyping();
          const err = await res.text();
          history.pop();
          addMsg(t().reqFailed + err, 'error');
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        let fullContent = '';
        let aiDiv = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop() || '';

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || !trimmed.startsWith('data: ')) continue;
            const data = trimmed.slice(6);
            if (data === '[DONE]') continue;
            try {
              const json = JSON.parse(data);
              const content = json.choices?.[0]?.delta?.content || '';
              if (content) {
                if (!aiDiv) {
                  removeTyping();
                  aiDiv = typingToAiDiv();
                  firstChunkTime = performance.now();
                }
                fullContent += content;
                aiDiv.textContent += content;
                chat.scrollTop = chat.scrollHeight;
              }
              if (json.usage) usage = json.usage;
            } catch {}
          }
        }

        if (!aiDiv) removeTyping();

        const totalTime = Math.round(performance.now() - t0);
        const ttfb = firstChunkTime > 0 ? Math.round(firstChunkTime - t0) : '-';
        const inTokens = usage?.prompt_tokens ?? '-';
        const outTokens = usage?.completion_tokens ?? '-';
        if (usage) {
          contextUsed = usage.total_tokens ?? ((usage.prompt_tokens ?? 0) + (usage.completion_tokens ?? 0));
        }
        updateContextBar();
        addMeta(t().metaFormat(ttfb, totalTime, inTokens, outTokens));
        console.log(`[frontend] TTFB=${ttfb}ms total=${totalTime}ms in=${inTokens} out=${outTokens}`);

        history.push({ role: 'assistant', content: fullContent });
      } catch (err) {
        removeTyping();
        history.pop();
        addMsg(t().netError + err.message, 'error');
      } finally {
        loading = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    input.focus();
    updateContextBar();
    applyLang();
  </script>
</body>
</html>
