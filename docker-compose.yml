services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: rwr-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rwr_agent
      POSTGRES_PASSWORD: rwr_agent_secret
      POSTGRES_DB: rwr_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rwr_agent -d rwr_agent"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: rwr-agent-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://rwr_agent:rwr_agent_secret@postgres:5432/rwr_agent
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount data directory for on-demand ingestion
      - ./data:/app/data:ro

volumes:
  postgres_data:
